<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NR Boynton</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #fff;
      --muted: #888;
      --bg: #000;
      --rule: #333;
      --font: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      padding: 2.5rem 1.5rem 5rem;
      max-width: 680px;
      margin: 0 auto;
    }

    a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--muted); }

    /* --- NAV --- */
    nav { margin-bottom: 2.5rem; }
    nav a { font-size: 0.9rem; text-decoration: none; }
    nav a:hover { text-decoration: underline; }

    /* --- HEADER --- */
    header { margin-bottom: 2.5rem; }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .tagline {
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .tagline .muted { color: var(--muted); }

    /* --- SOCIAL ICONS --- */
    .social {
      display: flex;
      gap: 1rem;
      margin-top: 1.25rem;
      align-items: center;
    }

    .social a {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      opacity: 0.85;
      transition: opacity 0.15s;
    }

    .social a:hover { opacity: 1; }

    .social svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* --- DIVIDER --- */
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
      width: 5rem;
    }

    /* --- SECTIONS --- */
    section { margin-bottom: 3rem; }

    section h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    /* --- POST LIST --- */
    .post-list { list-style: none; }

    .post-list li {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: 1rem;
      padding: 0.3rem 0;
      font-size: 0.9rem;
    }

    .post-date { color: var(--muted); white-space: nowrap; }

    .post-list a { color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
    .post-list a:hover { color: var(--muted); }

    /* --- PLAIN LIST --- */
    .plain-list { list-style: none; }

    .plain-list li {
      font-size: 0.9rem;
      padding: 0.25rem 0;
      line-height: 1.5;
    }

    .plain-list strong a { font-weight: 700; text-decoration: none; }
    .plain-list strong a:hover { text-decoration: underline; }
    .plain-list .desc { color: var(--muted); }

    /* --- FOOTER --- */
    footer { margin-top: 3rem; font-size: 0.8rem; color: var(--muted); }

    footer nav {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    footer nav a { color: var(--text); font-size: 0.8rem; text-decoration: none; }
    footer nav a:hover { text-decoration: underline; }

    /* --- SCROLL FADE-IN --- */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <nav class="reveal">
    <a href="/">NR Boynton</a>
  </nav>

  <header class="reveal">
    <h1>NR Boynton</h1>
    <p class="tagline">
      polymer scientist . researcher<br />
      <br />
      <span class="muted">materials science . machine learning . chemistry<br />
      ML &amp; polymer engineering</span>
    </p>

  <section id="writings" class="reveal">

      <li>
        <span class="post-date">2026-04-22</span>
        <a href="/intro.html">why I made a blog</a>

    </ul>
  </section>

  <hr class="reveal" />

  <section id="projects" class="reveal">

    </ul>
  </section>

  <footer class="reveal">
    <p>Copyright © <script>document.write(new Date().getFullYear())</script> NR Boynton</p>
    <nav>
      <a href="/">Home</a>
      <a href="/#writings">Writing</a>
      <a href="https://github.com/yourusername" target="_blank" rel="noopener">Code</a>
    </nav>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target); // only animate once
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>
