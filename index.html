<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NR Boynton</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #fff;
      --muted: #888;
      --bg: #000;
      --rule: #333;
      --font: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace;
    }

    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      padding: 2.5rem 1.5rem 5rem;
      max-width: 680px;
      margin: 0 auto;
    }

    a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover { color: var(--muted); }

    /* --- NAV --- */
    nav {
      margin-bottom: 2.5rem;
    }

    nav a {
      font-size: 0.9rem;
      text-decoration: none;
    }

    nav a:hover { text-decoration: underline; }

    /* --- HEADER --- */
    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .tagline {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
    }

    .tagline .muted {
      color: var(--muted);
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
      width: 5rem;
    }

    /* --- SECTIONS --- */
    section {
      margin-bottom: 3rem;
    }

    section h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    /* --- POST LIST --- */
    .post-list { list-style: none; }

    .post-list li {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: 1rem;
      padding: 0.3rem 0;
      font-size: 0.9rem;
    }

    .post-date {
      color: var(--muted);
      white-space: nowrap;
      padding-top: 0.05rem;
    }

    .post-list a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .post-list a:hover { color: var(--muted); }

    /* --- PLAIN LIST --- */
    .plain-list { list-style: none; }

    .plain-list li {
      font-size: 0.9rem;
      padding: 0.25rem 0;
      line-height: 1.5;
    }

    .plain-list strong a {
      font-weight: 700;
      text-decoration: none;
    }

    .plain-list strong a:hover { text-decoration: underline; }

    .plain-list .desc { color: var(--muted); }

    /* --- FOOTER --- */
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer nav {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    footer nav a {
      color: var(--text);
      font-size: 0.8rem;
      text-decoration: none;
    }

    footer nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="/">NR Boynton</a>
  </nav>

  <header>
    <h1>NR Boynton</h1>
    <p class="tagline">
      polymer scientist . researcher<br />
      <br />
      <span class="muted">materials science . machine learning<br />
      understanding how ML applies to industrial chemistry</span>
    </p>
  </header>

  <hr />

  <section id="writings">
    <h2>writings</h2>
    <ul class="post-list">
      <li>
        <span class="post-date">2026-04-22</span>
        <a href="/intro.html">The Promise of AI in Materials Science</a>
      </li>
    </ul>
  </section>

  <hr />

  <section id="projects">
    <h2>projects</h2>
    <ul class="plain-list">
    </ul>
  </section>

  <footer>
    <p>Copyright © <script>document.write(new Date().getFullYear())</script> NR Boynton </p>
    <nav>
      <a href="/">home</a>
      <a href="/#writings">writings</a>
      <a href="https://github.com/yourusername" target="_blank" rel="noopener">code</a>
    </nav>
  </footer>

</body>
</html>
